<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: #3157B4;
        }
        #line1{
            height: 200px;
            width: 50px;
            background-color: #84BE8D;
            transform: translateX(250px) translateY(200px);
        }
        #line2{
            height: 200px;
            width: 50px;
            background-color: #84BE8D;
            transform: translateX(400px);
        }
        #square1{
            height: 50px;
            width: 50px;
            background-color: #84BE8D;
            transform: translateY(-200px) translateX(220px);
        }
        #square2{
            height: 50px;
            width: 50px;
            background-color: #84BE8D;
            transform: translateY(-250.5px) translateX(368px);
        }
        #rectangle1{
            height: 40px;
            width: 100px;
            background-color: #84BE8D;
             transform: translateX(225px) translateY(-140px);
        }
        #rectangle2{
            height: 40px;
            width: 100px;
            background-color: #84BE8D;
            transform: translateX(375px) translateY(-180px);
        }
    </style>
</head>
<body>
    <div id="line1"></div>
    <div id="line2"></div>
    <div id="square1"></div>
    <div id="square2"></div>
    <div id="rectangle1"></div>
    <div id="rectangle2"></div>
</body>
</html>
