<html lang="en">
<head>

    <title>Document</title>
    <style>
        *{
            background-color: azure;
        }
        #firstcircle{
            height: 200px;
            width: 200px;
            background-color: blue;
            border-radius: 50%;
            transform: translateX(250px) translateY(250px);
        }
        #secondcircle{
            height: 50px;

            transform: translateX(325px) translateY(130px);

        #line{
            height: 150px;
            width: 25px;
            background-color: white;
            transform: translateX(338px) translateY(85px);
        }

        h1{
            font-size: 100px;
            transform: translateX(270px);
            
        }
    </style>
</head>
<body>
     <div id="firstcircle" align="center"></div>
     <div id="secondcircle" align="center"></div>
     <div id="line" align="center"></div>
     <h1>SBI</h1>

</html>
