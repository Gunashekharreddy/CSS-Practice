<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 1000px;
            width: 1000px;
        }
        .card{
            height: 500px;
            width: 500px;
            background-color:lightcoral;
            animation: switch-off 5s ease-in-out 0s infinite;
            border-radius: 20px;

        }
        .box{
            height: 150px;
            width: 150px;
            background-color: lavender;
            border-radius: 50%;
            animation: switch-off 3s ease-in-out 0s infinite;
        }
        @keyframes switch-off{
            0%,100%{
                transform: translate(0px,0px);
            }
            25%{
                transform: translate(350px,0px);

            }
            50%{
                transform: translate(350px,350px);

            }
            75%{
                 transform: translate(0px,350px);
            } 
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="box"></div>
        </div>
    </div>
</body>
</html>
