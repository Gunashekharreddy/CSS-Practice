<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .Container{
          display: flex;
          flex-direction: row;
          gap: 10px;
          flex-wrap: wrap;
          border: 2px solid green;
          margin: 10px;
          padding: 10px;
      }

      .Box{
          height: 250px;
          width: 250px;
          background-color: blueviolet;
          border-radius: 10px;
          display: flex;
      }
      .row{
          flex-direction: row;
      }
      .item1{
          height: 50px;
          width: 50px;
          background-color: brown;
          margin: 10px;
          border-radius: 10px;
          border: 2px solid black;
      }
      .row1{
         display: flex;
         flex-direction:column;
         justify-content: start;
      }
      .column{
        flex-direction: column;
      }
      .column1{
        flex-direction: column-reverse;
      }
      .column2{
        flex-direction: row-reverse;
      }
      .column3{
        justify-content: center;
      }
      .column4{
        justify-content: space-between;

      }
      .column5{
        justify-content: space-around;
      }
      .column6{
        display: flex;
        flex-direction: column;
        align-items: end;
      }
       .column7{
        display: flex;
        flex-direction: column;
        align-items:start;
      }
       .column8{
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      

    </style>
  </head>
  <body>
    <div class="Container">
      <div class="row1">
        <p>Flex1</p>
        <div class="Box row">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
    </div>
    <p align="center">Flex-Wrap</p>
    <div class="Container">
      <div class="row1">
        <p>Flex-column</p>
        <div class="Box column">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
      <div class="row1">
        <p>Flex-column-reverse</p>
        <div class="Box column1">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
      <div class="row1">
        <p>Flex-row-reverse</p>
        <div class="Box column2">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
      <div class="row1">
        <p>Flex-center</p>
        <div class="Box column3">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
      <div class="row1">
        <p>Flex-space-between</p>
        <div class="Box column4">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
      <div class="row1">
        <p>Flex-space-around</p>
        <div class="Box column5">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
    </div>
    <p align="center">Flex-align-items</p>
    <div class="Container">
      <div class="row1">
        <p>Flex-align-items</p>
        <div class="Box column6">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
       <div class="row1">
        <p>Flex-align-items</p>
        <div class="Box column7">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
       <div class="row1">
        <p>Flex-align-items</p>
        <div class="Box column8">
          <div class="item1"></div>
          <div class="item1"></div>
          <div class="item1"></div>
        </div>
      </div>
    </div>
  </body>
</html>
