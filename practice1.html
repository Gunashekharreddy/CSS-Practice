<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: #668884;
            
        }
        #bigcircle{
            width:300px;
            height:300px;
            background-color:#EED9D9;
            border-radius: 50%;
            transform: translateX(250px) translateY(250px);
        }
        #smallcircle{
            width:200px;
            height: 200px;
            border-radius: 50%;
            background-color:#668884;
            transform: translateX(300px);

        }
        #square{
            width:375px;
            height:75px;
            background-color:#668884;
            transform: translateY(-100px) translateX(200px);
        }
        #straightline{
            height: 35px;
            width: 350px;
            background-color:#668884;
            transform: translateX(250px) translateY(-110px);
        }
       

    </style>
</head>
<body>
   <div >
     <div id="bigcircle"></div>
    <div id="smallcircle"></div>
    <div id="square"></div>
    <div id="straightline"></div>
   </div>
</body>
</html>
