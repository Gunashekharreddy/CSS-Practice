<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr;
            grid-template-columns: 2fr 2fr;
            gap: 10px;
            padding: 20px;
            height: 700px;
            width: 900px;
            border: 3px solid black;
            grid-template-areas:
            "item1 item2"
            "item1 item3"
            "item1 item4"
            "item5 item6"
            "item5 item7";
            border-radius: 10px;
        }
        .item1{
            background-color: aqua;
            padding: 10px;
            grid-area: item1;            border-radius: 10px;

        }
        .item2{
            background-color: black;
            padding: 10px;
            grid-area: item2;             border-radius: 10px;

        }.item3{
            background-color: orange;
            padding: 10px;
            grid-area: item3;             border-radius: 10px;

        }.item4{
            background-color: green;
            padding: 10px;
            grid-area: item4;             border-radius: 10px;

        }.item5{
            background-color: black;
            padding: 10px;
            grid-area: item5;             border-radius: 10px;

        }.item6{
            background-color: blue;
            padding: 10px;
            grid-area: item6;             border-radius: 10px;

        }.item7{
            background-color:red;            border-radius: 10px;

            padding: 10px;
            grid-area: item7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
        <div class="item5">5</div>
        <div class="item6">6</div>
        <div class="item7">7</div>
    </div> 
</body>
</html>
