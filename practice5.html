<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: #B7D7CD;
        }
        #bigcircle{
            height: 150px;
            width: 150px;
            border-radius: 50%;
            background-color: #411C56;
            transform: translateX(350px) translateY(250px);
        }
        #smallcircle{
            height: 75px;
            width: 75px;
            border-radius: 50%;
            background-color: #B7D7CD;
            transform: translateX(390px) translateY(135px);

        }
        #bigrect{
            height: 300px;
            width: 75px;
            background-color: #C06C88;
            transform: translateX(350px) translateY(-50px);
        }
        #medrect{
            height: 50px;
            width: 150px;
            background-color: #C06C88;
            transform: translateX(310px) translateY(-60px);
        }
        #smallrect{
            height: 50px;
            width: 100px;
            background-color: #C06C88;
            transform: translateX(300px) translateY(-400.5px)

        }
        #smallrect2{
            height: 40px;
            width: 70px;
            background-color: #411C56;
            transform: translateX(425px) translateY(-450px);
        }
    </style>
</head>
<body>
    <div id="bigcircle" ></div>
    <div id="smallcircle"></div>
    <div id="bigrect"></div>
    <div id="medrect"></div>
    <div id="smallrect"></div>
    <div id="smallrect2"></div>
</body>
</html>
