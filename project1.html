<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            height: 400px;
            width: 300px;
            border: 2px solid black;
            border-radius: 10px;
            padding: 0px;
            background-color: black;
            box-shadow: 0px 0px 50px red;
            position: relative;
        }
        div img{
            width: 300px;
            height: 200px;
            border-radius: 10px 10px 0px 0px;            

        }
        body{
            background-color:grey;
            box-sizing: border-box;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }
        .card:hover{
            transform: translateY(-15px);
        }
        .info{
            margin: 15px;
            color: white;
        
        }
        .tech span{
            padding: 8px;
            background-color:pink;
            border-radius: 20px;
            color: black;
        }
        button{
            margin-top: 20px;
            width: 48%;
            cursor: pointer;
        }
        .btn1{
            height: 30px;
            width: 125px;
            background-color: lavender;
            border-radius: 20px;
            padding: 5px;
            transform: translateX(0px);
            background-color: grey;
            color: black;

        }
        .btn1:hover{
            background-color: white;
        }
        .btn2{
            height: 30px;
            width: 125px;
            background-color: lavender;
            border-radius: 20px;
            padding: 5px;
            transform: translate(10px);
            background: linear-gradient(to left,black,white);
            color: blue;
            font-weight: 100px;
            font-size: 15px;
        }
        .num{
            position: absolute;
            border-radius: 50%;
            top: 15px;
            left: 15px;
            background-color: black;
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>
    <section class="card">
        <div class="image">
            <img src="img4.jpg" alt="" >
            <span class="num">01</span>
        </div>
        <div class="info">
            <h2>Food Delivery System</h2>
            <p>Curd rice is good taste and they price also worthy to bought </p>
            <div class="tech">
                <span>Python</span>
                <span>Django</span>
                <span>React</span>
                <span>MySQL</span>
            </div>
            <div>
                <button class="btn1"><a href="https://github.com/Gunashekharreddy/CSS-Practice/blob/main/project1.html">Git Link</a></button>
                <button class="btn2"><a href="cart_image.png">solution</a></button>

            </div>
        </div>
    </section>
</body>
</html>
